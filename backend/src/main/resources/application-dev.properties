# ============================================================
#  PROFIL DÉVELOPPEMENT (actif par défaut en local)
#  Activez avec : --spring.profiles.active=dev
# ============================================================

# ===== BASE DE DONNÉES (locale) =====
spring.datasource.url=jdbc:postgresql://localhost:5432/gn_dechet_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de connexions
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# En développement : afficher les requêtes SQL pour le débogage
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate

# ===== LOGS =====
logging.level.com.assainissement=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
