# ============================================================
#  PROFIL PRODUCTION
#  Activez avec : --spring.profiles.active=prod
#  Les valeurs sensibles doivent être des variables d'environnement
# ============================================================

# ===== BASE DE DONNÉES (serveur) =====
# Utilisez des variables d'environnement pour la sécurité
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/gn_dechet_prod}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de connexions optimisé pour la production
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Jamais de création/modification automatique des tables en prod
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ===== LOGS (production : WARNING uniquement) =====
logging.level.com.assainissement=WARN
logging.level.org.springframework=WARN
logging.level.root=ERROR
