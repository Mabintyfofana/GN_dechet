# ============================================================
#  CONFIGURATION COMMUNE (héritée par dev et prod)
# ============================================================

# Nom de l'application
spring.application.name=GN_Dechet_Backend

# Désactiver la bannière Spring Boot (optionnel)
spring.main.banner-mode=off

# Format de dates JSON (ISO 8601)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Africa/Conakry

# ===== JPA / HIBERNATE =====
# Ne jamais mettre "create" ou "create-drop" en production !
# Valeur prod : validate (vérifie que le schéma correspond aux entités)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== JWT =====
# Clé secrète (OBLIGATOIRE en prod : utiliser une variable d'environnement)
# Minimum 256 bits (32 caractères) pour l'algorithme HS256
app.jwt.secret=${JWT_SECRET:GN_DechetSecretKeyForJWTTokenGenerationMinimum256Bits2026}
app.jwt.expiration-ms=86400000
# 86400000 ms = 24 heures

# ===== SERVEUR =====
server.port=8080
server.error.include-message=never
server.error.include-stacktrace=never
