# ==============================================================================
#  CONFIGURATION SPRING BOOT - GN_DÉCHET BACKEND
#  Profil actif par défaut : dev
# ==============================================================================

spring:
  application:
    name: gn-dechet-backend

  # ─── BASE DE DONNÉES ───────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/GN_dechet
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Masitan1}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: GNDechetHikariPool

  # ─── JPA / HIBERNATE ───────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update             # Hibernate crée/met à jour les tables manquantes
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  # ─── FLYWAY (Migrations automatiques) ─────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ─── JACKSON (Sérialisation JSON) ─────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
    default-property-inclusion: NON_NULL

# ─── SERVEUR ────────────────────────────────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /api/v1
  error:
    include-message: always
    include-binding-errors: always

# ─── SPRINGDOC / SWAGGER UI ─────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    config-url: /api/v1/api-docs/swagger-config
    url: /api/v1/api-docs
    operationsSorter: method
    tagsSorter: alpha
    try-it-out-enabled: true
    disable-swagger-default-url: true

# ─── ACTUATOR ───────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ─── CONFIGURATION JWT (personnalisée) ──────────────────────────────────────
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:404D635166546A576E5A7234753778214125442A472D4B6150645367566B5970}
      expiration: 86400000          # 24 heures en millisecondes
      refresh-token:
        expiration: 604800000       # 7 jours en millisecondes

# ─── LOGGING ────────────────────────────────────────────────────────────────
logging:
  level:
    gn.gov.assainissement: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"
